<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <style>
        body{
            background-color: black;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .title{
            font-size: 30px;
            font-weight: bold;
        }
        .move-icon{
            height: 50px;
           
        }
        .move-button{
            background-color: transparent;
            border: 3px solid white;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            cursor: pointer;
            margin-right: 10px;
        }
        .result{
            font-weight: bold;
            font-size: 20px;
            margin-top: 50px;
        }
        .reset-button{
            font-size: 15px;
            padding: 8px 15px;
            background-color: white;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="
        playGame('rock');"  class="move-button">
    <img src="rock.png" class="move-icon">
</button>

    <button onclick="
        playGame('paper');" class="move-button">
    <img src="paper.png" class="move-icon">
</button>

    <button onclick="
        playGame('scissors');"  class="move-button">
    <img src="scissors.png" class="move-icon">
</button>

<p class="js-result result"></p>
<p class="js-moves"></p>
<p class="js-score result"></p>

    <button onclick="
        score.wins=0;
        score.losses=0;
        score.ties=0;
     updateScore();
    "
    class="reset-button">Reset Score</button>

    <script>

        const score = {
            wins:0,
            losses:0,
            ties:0
        };

        updateScore();



        function playGame(playerMove) { 
     
        const computerMove = pickComputerMove();
        
        let result='';
            
        if (playerMove === 'rock') {
              if(computerMove === 'rock'){
                result='Tie';
            }
            else if (computerMove === 'paper'){
                result='You lose';
            }
            else if (computerMove === 'scissors'){
                result='You win';
            }

        } else if (playerMove === 'paper') {

            if(computerMove === 'rock'){
                result='You win';
            }
            else if (computerMove === 'paper'){
                result='Tie';
            }
            else if (computerMove === 'scissors'){
                result='You lose';
            }

        } else if (playerMove === 'scissors') {

            if(computerMove === 'rock'){
                result='You lose';
            }
            else if (computerMove === 'paper'){
                result='You win';
            }
            else if (computerMove === 'scissors'){
                result='Tie';
            }

        }

            if (result ==='You win'){
                score.wins += 1;
            } else if (result === 'You lose'){
                score.losses += 1;
            } else if (result === 'Tie'){
                score.ties += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));

            updateScore();

            document.querySelector('.js-moves').innerHTML=` You ${playerMove} - Computer ${computerMove}`;
            
            document.querySelector('.js-result').innerHTML=result;


       

        }

        function updateScore(){
            document.querySelector('.js-score').innerHTML=
        `Wins: ${score.wins}, Losses: ${score.losses},Ties: ${score.ties}`;
            
        }

        function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

            if(randomNumber >=0 && randomNumber < 1 / 3 ) {
                computerMove = 'rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3){
                computerMove = 'paper';

            } else if (randomNumber >= 2 / 3 && randomNumber < 1){
                computerMove = 'scissors';
            }
            return computerMove;
        }
    </script>
</body>
</html>
